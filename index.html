<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flights">
<title>Flights</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212a;
    --line: #262b36;
    --ink: #e8eaed;
    --dim: #8a909c;
    --accent: #6ee7b7;
    --accent-ink: #0f1115;
    --danger: #ff6b6b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100%;
    overscroll-behavior-y: none;
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: calc(var(--safe-top) + 14px) 20px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; justify-content: space-between;
    background: var(--bg);
  }
  header h1 {
    margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
  }
  header .count { font-size: 13px; color: var(--dim); font-variant-numeric: tabular-nums; }

  .col-head {
    display: grid;
    grid-template-columns: 1fr 96px 82px 26px;
    gap: 8px;
    padding: 10px 20px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--dim);
    border-bottom: 1px solid var(--line);
  }
  .col-head .r { text-align: right; }
  .col-head .c { text-align: center; }

  .list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 96px 82px 26px;
    gap: 8px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    animation: fade .18s ease;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(-4px); } }
  .row .name { font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .date {
    text-align: center; font-size: 12px; color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .row .date-btn {
    display: inline-block; cursor: pointer;
    padding: 4px 2px; line-height: 1.2;
    border-bottom: 1px dashed var(--line);
  }
  .row .date-btn:active { color: var(--accent); }
  .row .amt {
    text-align: right; font-size: 16px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .row .del {
    text-align: center; color: var(--dim); font-size: 20px;
    padding: 4px; cursor: pointer; line-height: 1;
  }
  .row .del:active { color: var(--danger); }

  .empty {
    text-align: center; color: var(--dim); font-size: 14px;
    padding: 48px 24px; line-height: 1.5;
  }

  .total {
    display: grid;
    grid-template-columns: 1fr 96px 82px 26px;
    gap: 8px;
    padding: 16px 20px;
    border-top: 2px solid var(--line);
    background: var(--panel);
    font-size: 15px;
  }
  .total .label { font-weight: 600; letter-spacing: -0.01em; }
  .total .sum {
    text-align: right; font-weight: 700; font-size: 20px;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }

  .entry {
    display: grid;
    grid-template-columns: 1fr 92px;
    gap: 8px;
    padding: 12px 14px calc(12px + var(--safe-bot));
    background: var(--panel-2);
    border-top: 1px solid var(--line);
  }
  .entry input {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }
  .entry input:focus { border-color: var(--accent); }
  .entry input::placeholder { color: var(--dim); }
  .entry .amt-in { text-align: right; font-variant-numeric: tabular-nums; }
  .entry .add {
    grid-column: 1 / -1;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px; font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .entry .add:active { opacity: .8; }
  .entry .add:disabled { opacity: .35; }
</style>
</head>
<body>
  <header>
    <h1>Flights</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="col-head">
    <span>Item</span>
    <span class="c">Date</span>
    <span class="r">Amount</span>
    <span></span>
  </div>

  <div class="list" id="list"></div>

  <div class="total">
    <span class="label">Total</span>
    <span></span>
    <span class="sum" id="sum">$0.00</span>
    <span></span>
  </div>

  <div class="entry">
    <input id="name" placeholder="What for?" autocomplete="off" enterkeyhint="next">
    <input id="amt" class="amt-in" placeholder="0.00" inputmode="decimal" enterkeyhint="done">
    <button class="add" id="add">Add</button>
  </div>

<script>
const KEY = 'ledger.entries.v1';
let entries = [];

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    entries = raw ? JSON.parse(raw) : [];
  } catch { entries = []; }
  render();
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(entries)); }
  catch (e) { console.error('save failed', e); }
}

function fmt(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function longDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function render() {
  const list = document.getElementById('list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty">No entries yet.<br>Add your first one below.</div>';
  } else {
    list.innerHTML = entries.map(e => `
      <div class="row">
        <div class="name">${escapeHtml(e.name)}</div>
        <div class="date"><span class="date-btn" data-id="${e.id}">${longDate(e.date)}</span></div>
        <div class="amt">${fmt(e.amount)}</div>
        <div class="del" data-id="${e.id}">&times;</div>
      </div>`).join('');
  }
  const total = entries.reduce((s, e) => s + e.amount, 0);
  document.getElementById('sum').textContent = fmt(total);
  document.getElementById('count').textContent = entries.length ? entries.length + ' item' + (entries.length > 1 ? 's' : '') : '';

  list.querySelectorAll('.del').forEach(el =>
    el.addEventListener('click', () => remove(el.dataset.id)));
  list.querySelectorAll('.date-btn').forEach(el =>
    el.addEventListener('click', () => editDate(el.dataset.id)));
}

// Parse "MMDDYY" or "MM-DD-YY" (also accepts MM/DD/YY) into an ISO date string.
function parseMMDDYY(input) {
  const digits = (input || '').replace(/\D/g, '');
  if (digits.length !== 6) return null;
  const mm = parseInt(digits.slice(0, 2), 10);
  const dd = parseInt(digits.slice(2, 4), 10);
  const yy = parseInt(digits.slice(4, 6), 10);
  if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
  const year = 2000 + yy;
  const d = new Date(Date.UTC(year, mm - 1, dd));
  if (d.getUTCMonth() !== mm - 1 || d.getUTCDate() !== dd) return null; // rejects e.g. 02-30
  return d.toISOString();
}

function editDate(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const input = prompt('Enter date as MM-DD-YY', '');
  if (input === null || input.trim() === '') return;
  const iso = parseMMDDYY(input);
  if (!iso) { alert('Please enter a valid date as MM-DD-YY (e.g. 03-14-26).'); return; }
  e.date = iso;
  render();
  save();
}

function changeDate(id, val) {
  if (!val) return;
  const e = entries.find(x => x.id === id);
  if (e) { e.date = val + 'T00:00:00.000Z'; save(); }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function add() {
  const nameEl = document.getElementById('name');
  const amtEl = document.getElementById('amt');
  const name = nameEl.value.trim();
  const amount = parseFloat(amtEl.value);
  if (!name || isNaN(amount)) return;
  entries.unshift({ id: Date.now() + '' + Math.random().toString(36).slice(2,6), name, amount, date: new Date().toISOString() });
  nameEl.value = ''; amtEl.value = '';
  nameEl.focus();
  render();
  save();
}

function remove(id) {
  entries = entries.filter(e => e.id !== id);
  render();
  save();
}

function checkValid() {
  const ok = document.getElementById('name').value.trim() && document.getElementById('amt').value.trim();
  document.getElementById('add').disabled = !ok;
}

document.getElementById('add').addEventListener('click', add);
document.getElementById('name').addEventListener('input', checkValid);
document.getElementById('amt').addEventListener('input', checkValid);
document.getElementById('name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('amt').focus(); });
document.getElementById('amt').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

checkValid();
load();
</script>
</body>
</html>
